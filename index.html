<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завод по преобразованию энергии из навоза</title>
    <style>
        /* ...все ваши стили без изменений... */
        .mode-switcher {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .mode-btn {
            background: #2ecc71;
            color: #fff;
            border: none;
            border-radius: 23px;
            font-size: 1rem;
            padding: 10px 24px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .mode-btn.active {
            background: #27ae60;
            box-shadow: 0 0 0 2px #2ecc71;
        }
        @media (max-width: 768px) {
            .mode-btn {
                font-size: 0.95rem;
                padding: 8px 10px;
            }
            .mode-switcher {
                gap: 6px;
            }
        }
    </style>
</head>
<body>
<!-- ...остальной html без изменений... -->
<section style="background-color: #ffffff; padding: 20px 0;">
    <div class="container">
        <h2>Симуляция биореактора</h2>
        <div class="mode-switcher">
            <button class="mode-btn active" data-mode="reactor">Реактор</button>
            <button class="mode-btn" data-mode="bacteria">Бактерии</button>
            <button class="mode-btn" data-mode="gas">Газ</button>
        </div>

        <div class="controls-container">
            <div class="control-item">
                <label>Температура: <span id="tempValue">35</span>°C</label>
                <input type="range" id="tempSlider" min="10" max="60" value="35">
            </div>
            <div class="control-item">
                <label>Навоз в день: <span id="manureValue">50</span> т</label>
                <input type="range" id="manureSlider" min="0" max="100" value="50">
            </div>
            <div class="control-item">
                <label>Объём реактора: <span id="volValue">1000</span> м³</label>
                <input type="range" id="volSlider" min="100" max="2000" value="1000">
            </div>
        </div>
        <div style="text-align:center;">
            <canvas id="reactorCanvas"></canvas>
        </div>
        <div class="stats-panel">
            <div class="stat-box">
                <p>Активность бактерий</p>
                <span id="activityValue">0</span>%
            </div>
            <div class="stat-box">
                <p>Производство биогаза</p>
                <span id="biogasValue">0</span> м³/день
            </div>
        </div>
    </div>
</section>
<script src="simulation.js"></script>
<footer>
    <div class="container">
        <p>Школьный проект. Авторы: Мамат Арфан, Шин Андрей.</p>
    </div>
</footer>
</body>
</html>
